name: devenv-snapotter

services:
  snapotter:
    image: snapotter/snapotter:latest
    container_name: devenv-snapotter
    restart: unless-stopped
    ports:
      - "1349:1349"
    volumes:
      - devenv-snapotter-data:/data
    environment:
      AUTH_ENABLED: "true"
      DEFAULT_USERNAME: admin
      DEFAULT_PASSWORD: admin

volumes:
  devenv-snapotter-data:
